<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rax Shop - Admin Panel</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fb;
      }

      .admin-wrapper {
        display: flex;
        min-height: 100vh;
      }

      .admin-sidebar {
        width: 260px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
      }

      .admin-sidebar .brand {
        padding: 25px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
      }

      .admin-sidebar .brand img {
        width: 100px;
        height: auto;
        margin-bottom: 15px;
        background: white;
        padding: 8px;
        border-radius: 12px;
      }

      .admin-sidebar .brand h3 {
        margin: 10px 0 5px 0;
        font-size: 18px;
        color: white;
      }

      .admin-sidebar .brand p {
        font-size: 12px;
        opacity: 0.8;
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
      }

      .admin-sidebar .nav-item {
        padding: 12px 25px;
        transition: 0.3s;
      }

      .admin-sidebar .nav-item:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .admin-sidebar .nav-item a {
        color: white;
        text-decoration: none;
        display: block;
      }

      .admin-sidebar .nav-item i {
        width: 25px;
        margin-right: 10px;
      }

      .admin-content {
        flex: 1;
        margin-left: 260px;
        padding: 20px;
      }

      .admin-header {
        background: white;
        padding: 15px 25px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-logo img {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        object-fit: cover;
        background: white;
        padding: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .header-logo span {
        font-size: 18px;
        font-weight: 600;
        color: #333;
      }

      .header-logo span small {
        font-size: 12px;
        font-weight: normal;
        color: #666;
        display: block;
      }

      .admin-header .user-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .admin-header .user-name {
        font-weight: 600;
        color: #333;
        background: #f0f0f0;
        padding: 8px 15px;
        border-radius: 20px;
      }

      .logout-btn {
        background: #e84545;
        color: white;
        padding: 8px 15px;
        border-radius: 6px;
        text-decoration: none;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logout-btn:hover {
        background: #d63a3a;
        color: white;
        transform: translateY(-2px);
      }

      @media (max-width: 768px) {
        .admin-sidebar {
          transform: translateX(-100%);
          transition: 0.3s;
          z-index: 1000;
        }
        .admin-sidebar.active {
          transform: translateX(0);
        }
        .admin-content {
          margin-left: 0;
        }
        .admin-header {
          flex-direction: column;
          text-align: center;
        }
        .header-logo {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <div class="admin-sidebar">
        <div class="brand">
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            alt="Rax Shop"
          />
          <h3>Rax Shop Management</h3>
          <p>Admin Dashboard</p>
        </div>
        <div class="nav-item">
          <a href="/admin/dashboard">
            <i class="fas fa-tachometer-alt"></i> Dashboard
          </a>
        </div>
        <div class="nav-item">
          <a href="/admin/orders">
            <i class="fas fa-shopping-cart"></i> Orders
          </a>
        </div>
        <div class="nav-item">
          <a href="/admin/products"> <i class="fas fa-box"></i> Products </a>
        </div>
        <div class="nav-item">
          <a href="/admin/users"> <i class="fas fa-users"></i> Users </a>
        </div>
      </div>

      <div class="admin-content">
        <div class="admin-header">
          <div class="header-logo">
            <img
              src="{{ url_for('static', filename='logo.png') }}"
              alt="Rax Shop"
            />
            <span>
              Rax Shop Admin
              <small>Management Panel</small>
            </span>
          </div>
          <div class="user-info">
            <span class="user-name">
              <i class="fas fa-user-circle"></i> {{ admin_name }}
            </span>
            <a href="/admin/logout" class="logout-btn">
              <i class="fas fa-sign-out-alt"></i> Logout
            </a>
          </div>
        </div>

        {% block content %}{% endblock %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
