{% extends "base.html" %} {% block content %}
<style>
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
  }

  body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
  }

  .items {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
  }

  .categories h3 {
      text-align: center;
      margin-bottom: 40px;
      color: #333;
      font-size: 2em;
      font-weight: 600;
      position: relative;
      padding-bottom: 15px;
  }

  .categories h3:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(135deg,
          {% if category == 'Electronics' %}#667eea
          {% elif category == 'Books' %}#e74c3c
          {% elif category == 'Grocery' %}#27ae60
          {% else %}#e74c3c{% endif %},
          {% if category == 'Electronics' %}#764ba2
          {% elif category == 'Books' %}#f093fb
          {% elif category == 'Grocery' %}#2ecc71
          {% else %}#fa709a{% endif %});
      border-radius: 2px;
  }

  .products-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
      padding: 20px;
  }

  .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid #eee;
  }

  .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border-color: #e0e0e0;
  }

  .product-image {
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      overflow: hidden;
  }

  .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
  }

  .product-card:hover .product-image img {
      transform: scale(1.03);
  }

  .product-info {
      padding: 15px;
      text-align: center;
  }

  .product-name {
      font-size: 1.1em;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
  }

  .product-price {
      font-size: 1.2em;
      color:
          {% if category == 'Electronics' %}#667eea
          {% elif category == 'Books' %}#e74c3c
          {% elif category == 'Grocery' %}#27ae60
          {% else %}#e74c3c{% endif %};
      font-weight: bold;
      margin: 10px 0;
  }

  .product-button {
      width: 100%;
      padding: 8px;
      background:
          {% if category == 'Electronics' %}#667eea
          {% elif category == 'Books' %}#e74c3c
          {% elif category == 'Grocery' %}#27ae60
          {% else %}#e74c3c{% endif %};
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      font-size: 0.85em;
  }

  .product-button:hover {
      background:
          {% if category == 'Electronics' %}#5a67d8
          {% elif category == 'Books' %}#c0392b
          {% elif category == 'Grocery' %}#219a52
          {% else %}#c0392b{% endif %};
      transform: translateY(-2px);
  }

  /* Responsive */
  @media (max-width: 1200px) {
      .products-container {
          grid-template-columns: repeat(3, 1fr);
      }
  }

  @media (max-width: 900px) {
      .products-container {
          grid-template-columns: repeat(2, 1fr);
      }
  }

  @media (max-width: 600px) {
      .products-container {
          grid-template-columns: 1fr;
      }
  }
</style>

<div class="items">
  <div class="categories">
    <h3>{{ category }}</h3>
    <div class="products-container">
      {% for product in products %}
      <div
        class="product-card"
        data-id="{{ product.product_id }}"
        data-name="{{ product.name }}"
        data-price="{{ product.price }}"
        data-image="{{ product.image_url }}"
        data-rating="{{ product.rating }}"
        data-description="{{ product.description }}"
        data-features="{{ product.features }}"
      >
        <div class="product-image">
          <img
            src="{{ product.image_url }}"
            alt="{{ product.name }}"
            onerror="this.src='https://placehold.co/400x400/f0f0f0/333?text={{ product.name }}'"
          />
        </div>
        <div class="product-info">
          <div class="product-name">{{ product.name }}</div>
          <div class="product-price">${{ "%.2f"|format(product.price) }}</div>
          <button
            class="product-button"
            onclick="event.stopPropagation(); addToCart('{{ product.product_id }}', '{{ product.name }}', {{ product.price }}, '{{ category }}')"
          >
            Add to Cart
          </button>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>

<div
  id="productModal"
  class="modal"
  style="
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
  "
>
  <div
    class="modal-content"
    style="
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
    "
  >
    <button
      class="close-btn"
      onclick="closeModal()"
      style="
        position: absolute;
        right: 15px;
        top: 10px;
        font-size: 24px;
        cursor: pointer;
        background: none;
        border: none;
      "
    >
      &times;
    </button>
    <img
      id="modalImage"
      style="
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 15px;
      "
    />
    <h2 id="modalTitle" style="margin-bottom: 10px"></h2>
    <div id="modalRating" style="color: #f39c12; margin-bottom: 10px"></div>
    <div
      id="modalPrice"
      style="
        font-size: 24px;
        color: #e74c3c;
        font-weight: bold;
        margin-bottom: 15px;
      "
    ></div>
    <p id="modalDescription" style="color: #666; margin-bottom: 15px"></p>
    <div>
      <h4>Key Features</h4>
      <ul id="modalFeatures" style="list-style: none; padding: 0"></ul>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 20px">
      <button
        onclick="addFromModal()"
        style="
          flex: 1;
          padding: 10px;
          background: #27ae60;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        "
      >
        Add to Cart
      </button>
      <button
        onclick="closeModal()"
        style="
          flex: 1;
          padding: 10px;
          background: #95a5a6;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        "
      >
        Close
      </button>
    </div>
  </div>
</div>

<script>
  let currentProduct = {};

  document.querySelectorAll(".product-card").forEach((card) => {
    card.addEventListener("click", function (e) {
      if (e.target.classList.contains("product-button")) return;

      currentProduct = {
        id: this.dataset.id,
        name: this.dataset.name,
        price: parseFloat(this.dataset.price),
        category: "{{ category }}",
      };

      document.getElementById("modalImage").src = this.dataset.image;
      document.getElementById("modalTitle").innerText = this.dataset.name;
      document.getElementById("modalPrice").innerText =
        "$" + parseFloat(this.dataset.price).toFixed(2);

      const rating = parseFloat(this.dataset.rating);
      const fullStars = Math.floor(rating);
      const emptyStars = 5 - fullStars;
      document.getElementById("modalRating").innerHTML =
        "★".repeat(fullStars) + "☆".repeat(emptyStars) + " (" + rating + "/5)";

      document.getElementById("modalDescription").innerText =
        this.dataset.description;

      const featuresList = document.getElementById("modalFeatures");
      featuresList.innerHTML = "";

      const features = this.dataset.features;
      if (features && features !== "" && features !== "None") {
        const featureArray = features.split(",");
        for (let i = 0; i < featureArray.length; i++) {
          if (featureArray[i].trim()) {
            const li = document.createElement("li");
            li.style.padding = "5px 0";
            li.style.display = "flex";
            li.style.alignItems = "center";
            li.innerHTML = "✓ " + featureArray[i].trim();
            featuresList.appendChild(li);
          }
        }
      }

      if (featuresList.children.length === 0) {
        const defaultFeatures = [
          "Premium Quality",
          "Best Price",
          "Fast Delivery",
          "Secure Checkout",
        ];
        for (let i = 0; i < defaultFeatures.length; i++) {
          const li = document.createElement("li");
          li.style.padding = "5px 0";
          li.style.display = "flex";
          li.style.alignItems = "center";
          li.innerHTML = "✓ " + defaultFeatures[i];
          featuresList.appendChild(li);
        }
      }

      document.getElementById("productModal").style.display = "block";
      document.body.style.overflow = "hidden";
    });
  });

  function closeModal() {
    document.getElementById("productModal").style.display = "none";
    document.body.style.overflow = "auto";
  }

  function addFromModal() {
    addToCart(
      currentProduct.id,
      currentProduct.name,
      currentProduct.price,
      "{{ category }}",
    );
    closeModal();
  }

  function addToCart(id, name, price, category) {
    fetch("/add_to_cart", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, name, price, category, quantity: 1 }),
    })
      .then((response) => response.json())
      .then((data) => {
        if (data.success) {
          alert(data.message || "✓ Item added to cart!");
        } else {
          alert("Error: " + (data.error || "Could not add to cart"));
        }
      })
      .catch((error) => {
        console.error("Error:", error);
        alert("Error adding item to cart");
      });
  }

  window.onclick = function (event) {
    const modal = document.getElementById("productModal");
    if (event.target === modal) {
      closeModal();
    }
  };
</script>
{% endblock %}
